<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PD人格测评 | SYLOON</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-dark: #056E50;
            --color-light: #00E6DC;
            --color-text: #013F31;
            --color-text-light: rgba(1, 63, 49, 0.7);
            --color-text-muted: rgba(1, 63, 49, 0.5);
            --color-card-bg: rgba(255, 255, 255, 0.92);
            --color-card-border: rgba(255, 255, 255, 0.6);
            --color-btn-primary: #056E50;
            --color-btn-primary-hover: #0B594C;
            --color-btn-text: #00E6DC;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            color: var(--color-text);
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(135deg, #056E50 0%, #0B8C6E 30%, #00D4C8 70%, #00E6DC 100%);
            background-attachment: fixed;
        }

        .bg-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(0, 230, 220, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(5, 110, 80, 0.2) 0%, transparent 60%);
        }

        .particles {
            position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden;
        }
        .particle {
            position: absolute; width: 4px; height: 4px;
            background: rgba(255, 255, 255, 0.5); border-radius: 50%;
            animation: floatUp 12s linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            15% { opacity: 0.8; }
            85% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .app-container {
            position: relative; z-index: 2; max-width: 720px; margin: 0 auto;
            padding: 20px; min-height: 100vh; display: flex; flex-direction: column;
        }

        .page { display: none; flex: 1; flex-direction: column; animation: fadeIn 0.5s ease; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

        /* ===== 首页 ===== */
        .home-page { justify-content: center; align-items: center; text-align: center; padding: 40px 16px; }
        .logo-area { margin-bottom: 32px; }
        .logo-img {
            width: 160px; height: auto; margin: 0 auto 20px;
            filter: brightness(0) invert(1) drop-shadow(0 4px 16px rgba(0,0,0,0.15));
        }
        .main-title {
            font-size: clamp(26px, 6vw, 40px); font-weight: 900; line-height: 1.25;
            margin-bottom: 12px; color: #ffffff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .subtitle {
            font-size: 16px; color: rgba(255,255,255,0.85); margin-bottom: 40px;
            line-height: 1.7; max-width: 440px; font-weight: 400;
        }
        .start-btn {
            background: #ffffff; color: var(--color-btn-primary); border: none;
            padding: 18px 56px; font-size: 18px; font-weight: 700;
            border-radius: 50px; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            font-family: inherit; letter-spacing: 2px;
        }
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.2);
            background: #f0fffc;
        }
        .start-btn:active { transform: translateY(0); }

        /* ===== 测试页 ===== */
        .quiz-page { padding: 16px 0 32px; }
        .quiz-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; padding: 0 8px;
        }
        .back-btn {
            background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.3);
            color: #ffffff; padding: 8px 18px; border-radius: 20px;
            cursor: pointer; font-size: 14px; transition: all 0.3s;
            font-family: inherit; backdrop-filter: blur(10px);
        }
        .back-btn:hover { background: rgba(255,255,255,0.4); }
        .progress-area { flex: 1; margin: 0 16px; }
        .progress-text {
            font-size: 13px; color: rgba(255,255,255,0.9); margin-bottom: 6px;
            text-align: right; font-weight: 500;
        }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }
        .progress-fill {
            height: 100%; background: #ffffff; border-radius: 2px;
            transition: width 0.4s ease; box-shadow: 0 0 8px rgba(255,255,255,0.3);
        }

        .question-card {
            background: var(--color-card-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--color-card-border); border-radius: 20px;
            padding: 28px 24px; margin-bottom: 16px;
            animation: slideIn 0.4s ease;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        .dimension-tag {
            display: inline-block; background: var(--color-btn-primary); color: #ffffff;
            padding: 5px 14px; border-radius: 10px; font-size: 12px;
            font-weight: 700; margin-bottom: 16px; letter-spacing: 0.5px;
        }
        .question-text {
            font-size: 18px; font-weight: 700; line-height: 1.65;
            margin-bottom: 24px; color: var(--color-text);
        }

        .options-list { display: flex; flex-direction: column; gap: 10px; }
        .option-item {
            background: rgba(5, 110, 80, 0.06); border: 1.5px solid rgba(5, 110, 80, 0.12);
            border-radius: 14px; padding: 16px 18px; cursor: pointer;
            transition: all 0.25s ease; display: flex; align-items: flex-start; gap: 14px;
            position: relative;
        }
        .option-item:hover {
            background: rgba(5, 110, 80, 0.1); border-color: rgba(5, 110, 80, 0.3);
            transform: translateX(3px);
        }
        .option-item.selected {
            background: rgba(0, 230, 220, 0.15); border-color: var(--color-dark);
            box-shadow: 0 0 0 1px var(--color-dark);
        }
        .option-letter {
            width: 30px; height: 30px; min-width: 30px;
            border: 2px solid rgba(5, 110, 80, 0.25); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; color: var(--color-dark);
            transition: all 0.25s; background: rgba(255,255,255,0.5);
        }
        .option-item:hover .option-letter {
            border-color: var(--color-dark); background: rgba(0, 230, 220, 0.2);
        }
        .option-item.selected .option-letter {
            border-color: var(--color-dark); background: var(--color-dark); color: #ffffff;
        }
        .option-text {
            font-size: 15px; line-height: 1.6; color: var(--color-text);
            font-weight: 400; padding-top: 4px;
        }

        .nav-btns { display: flex; justify-content: space-between; margin-top: 20px; padding: 0 8px; gap: 12px; }
        .nav-btn {
            padding: 14px 32px; border-radius: 12px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.3s; font-family: inherit; border: none;
            flex: 1;
        }
        .nav-btn-prev {
            background: rgba(255,255,255,0.25); color: #ffffff;
            border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(10px);
        }
        .nav-btn-prev:hover { background: rgba(255,255,255,0.4); }
        .nav-btn-next {
            background: #ffffff; color: var(--color-btn-primary);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1); font-weight: 700;
        }
        .nav-btn-next:hover {
            transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            background: #f0fffc;
        }
        .nav-btn-next:disabled {
            opacity: 0.35; cursor: not-allowed; transform: none;
            box-shadow: none; background: rgba(255,255,255,0.5); color: var(--color-text-muted);
        }

        /* ===== 结果页 ===== */
        .result-page { padding: 16px 0 32px; }
        .result-hero {
            text-align: center; padding: 32px 16px 24px; animation: scaleIn 0.6s ease;
        }
        .result-type-zh {
            font-size: 32px; font-weight: 900; margin-bottom: 8px; color: #ffffff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .result-type-en {
            font-size: 15px; color: rgba(255,255,255,0.9); letter-spacing: 4px;
            margin-bottom: 16px; font-weight: 600;
        }
        .result-quote {
            font-size: 16px; color: rgba(255,255,255,0.85); font-style: italic;
            line-height: 1.75; max-width: 480px; margin: 0 auto 24px; padding: 0 16px;
            font-weight: 400;
        }
        .result-quote::before {
            content: '"'; font-size: 36px; color: rgba(255,255,255,0.5);
            line-height: 0; vertical-align: -16px; margin-right: 4px;
        }

        .result-section {
            background: var(--color-card-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--color-card-border); border-radius: 18px;
            padding: 24px; margin-bottom: 14px; animation: slideIn 0.5s ease;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }
        .result-section-title {
            font-size: 16px; font-weight: 700; color: var(--color-btn-primary);
            margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
        }
        .result-section-title::before {
            content: ''; width: 4px; height: 16px;
            background: var(--color-btn-primary); border-radius: 2px;
        }
        .result-section-text {
            font-size: 15px; color: var(--color-text); line-height: 1.75;
            font-weight: 400;
        }
        .result-section-text strong {
            color: var(--color-btn-primary); font-weight: 700;
        }

        .score-bars { display: flex; flex-direction: column; gap: 14px; margin-top: 6px; }
        .score-bar-item { display: flex; align-items: center; gap: 12px; }
        .score-bar-label {
            width: 90px; font-size: 13px; color: var(--color-text-light);
            text-align: right; flex-shrink: 0; font-weight: 500;
        }
        .score-bar-track {
            flex: 1; height: 10px; background: rgba(5, 110, 80, 0.1);
            border-radius: 5px; overflow: hidden; position: relative;
        }
        .score-bar-fill {
            height: 100%; border-radius: 5px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .score-bar-value {
            width: 32px; font-size: 14px; font-weight: 700;
            color: var(--color-btn-primary); text-align: left; flex-shrink: 0;
        }
        .score-bar-fill.echoer { background: linear-gradient(90deg, #6B7280, #9CA3AF); }
        .score-bar-fill.pleaser { background: linear-gradient(90deg, #D97706, #F59E0B); }
        .score-bar-fill.soloer { background: linear-gradient(90deg, #DB2777, #EC4899); }
        .score-bar-fill.partner { background: linear-gradient(90deg, #056E50, #00E6DC); }

        .radar-area { display: flex; justify-content: center; margin: 16px 0; }
        .radar-chart { width: 260px; height: 260px; }

        .dimension-tags {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 12px;
        }
        .dimension-tag-item {
            font-size: 11px; padding: 4px 10px; border-radius: 8px; font-weight: 600;
        }

        .action-area {
            display: flex; flex-direction: column; gap: 12px;
            margin-top: 28px; padding: 0 8px;
        }
        .action-btn {
            width: 100%; padding: 16px; border-radius: 14px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: all 0.3s; font-family: inherit; border: none;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .action-btn-primary {
            background: #ffffff; color: var(--color-btn-primary);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .action-btn-primary:hover {
            transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            background: #f0fffc;
        }
        .action-btn-secondary {
            background: rgba(255,255,255,0.2); color: #ffffff;
            border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(10px);
        }
        .action-btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }

        .restart-btn { margin-top: 12px; text-align: center; }
        .restart-btn button {
            background: none; border: none; color: rgba(255,255,255,0.7);
            font-size: 14px; cursor: pointer; padding: 10px 20px;
            transition: color 0.3s; font-family: inherit;
        }
        .restart-btn button:hover { color: #ffffff; }

        .toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #ffffff; color: var(--color-btn-primary); padding: 12px 28px;
            border-radius: 12px; font-size: 14px; font-weight: 600;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15); z-index: 1000;
            opacity: 0; transition: all 0.4s ease; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .copy-modal {
            position: fixed; inset: 0; z-index: 100;
            display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
        }
        .copy-modal.active { display: flex; }
        .copy-modal-content {
            background: #ffffff; border-radius: 20px; padding: 24px;
            max-width: 90%; width: 480px; max-height: 80vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: scaleIn 0.3s ease;
        }
        .copy-modal-title {
            font-size: 18px; font-weight: 700; color: var(--color-text);
            margin-bottom: 16px; text-align: center;
        }
        .copy-textarea {
            width: 100%; min-height: 200px; padding: 16px;
            border: 1.5px solid rgba(5, 110, 80, 0.15); border-radius: 12px;
            font-size: 14px; line-height: 1.7; color: var(--color-text);
            font-family: inherit; resize: none; background: rgba(5, 110, 80, 0.03);
            margin-bottom: 16px;
        }
        .copy-textarea:focus {
            outline: none; border-color: var(--color-dark);
        }
        .copy-modal-btns { display: flex; gap: 12px; }
        .copy-modal-btns .action-btn { flex: 1; padding: 12px; }

        @media (max-width: 600px) {
            .logo-img { width: 130px; }
            .question-card { padding: 22px 18px; }
            .option-item { padding: 14px 16px; }
            .result-section { padding: 20px 18px; }
            .nav-btns { flex-direction: column; }
            .nav-btn { width: 100%; }
            .main-title { font-size: 26px; }
            .result-type-zh { font-size: 26px; }
        }
    </style>
</head>

            const container = document.getElementById('particles');

                p.style.width = (2 + Math.random() * 3) + 'px';
                p.style.height = p.style.width;
                container.appendChild(p);
            }
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
        function goHome() { showPage('homePage'); }

        function startQuiz() {
            currentQ = 0; answers = new Array(20).fill(null);
            showPage('quizPage'); renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentQ];
            const card = document.getElementById('questionCard');
            const dimIndex = dimensionMap[q.num];
            const dimName = dimensionNames[dimIndex];

            card.innerHTML = `
                <div class="dimension-tag">维度${dimIndex+1}：${dimName}</div>
                <div class="question-text">${q.num}. ${q.text}</div>
                <div class="options-list">
                    ${q.options.map((opt,i) => `
                        <div class="option-item ${answers[currentQ]===i ? 'selected' : ''}" onclick="selectOption(${i})">
                            <div class="option-letter">${String.fromCharCode(65+i)}</div>
                            <div class="option-text">${opt.text}</div>
                        </div>
                    `).join('')}
                </div>
            `;

            const progress = ((currentQ+1)/20)*100;
            document.getElementById('progressText').textContent = `${currentQ+1} / 20`;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('prevBtn').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
            document.getElementById('nextBtn').textContent = currentQ === 19 ? '查看结果' : '下一题';
            document.getElementById('nextBtn').disabled = answers[currentQ] === null;
        }

        function selectOption(index) {
            answers[currentQ] = index;
            document.querySelectorAll('.option-item').forEach((el,i) => el.classList.toggle('selected', i===index));
            document.getElementById('nextBtn').disabled = false;
            if (currentQ < 19) setTimeout(() => nextQuestion(), 350);
        }

        function prevQuestion() { if (currentQ > 0) { currentQ--; renderQuestion(); } }

        function nextQuestion() {
            if (answers[currentQ] === null) return;
            if (currentQ < 19) { currentQ++; renderQuestion(); }
            else { showResult(); }
        }

        function calculateResult() {
            const scores = {'被动响应型':0,'过度承诺型':0,'内耗努力型':0,'客户伙伴型':0};
            const dimensionScores = new Array(10).fill(0).map(() => ({'被动响应型':0,'过度承诺型':0,'内耗努力型':0,'客户伙伴型':0}));

            questions.forEach((q,idx) => {
                if (answers[idx] === null) return;
                const type = q.options[answers[idx]].type;
                scores[type] += 1;
                dimensionScores[dimensionMap[q.num]][type] += 1;
            });

            let maxScore = -1, mainType = '客户伙伴型';
            for (const [type,score] of Object.entries(scores)) {
                if (score > maxScore) { maxScore = score; mainType = type; }
            }

            const dimensionDominant = dimensionScores.map(ds => {
                let max=-1, dom='客户伙伴型';
                for (const [t,s] of Object.entries(ds)) { if (s>max) { max=s; dom=t; } }
                return dom;
            });

            const sortedScores = Object.entries(scores).sort((a,b) => b[1]-a[1]);

            return { scores, mainType, dimensionScores, dimensionDominant, sortedScores, maxScore };
        }

            const result = calculateResult();

            document.getElementById('resultHero').innerHTML = `
                <div class="result-type-zh">${result.mainType}PD</div>
                <div class="result-type-en">${p.en}</div>
                <div class="result-quote">${p.quote}</div>
            `;

            const content = document.getElementById('resultContent');
            content.innerHTML = `
                <div class="result-section" style="animation-delay:0.1s">
                    <div class="result-section-title">人格画像</div>
                    <div class="result-section-text">${p.desc}</div>
                </div>
                <div class="result-section" style="animation-delay:0.2s">
                    <div class="result-section-title">你的优势</div>
                    <div class="result-section-text">${p.advantage}</div>
                </div>
                <div class="result-section" style="animation-delay:0.3s">
                    <div class="result-section-title">你的风险</div>
                    <div class="result-section-text">${p.risk}</div>
                </div>
                <div class="result-section" style="animation-delay:0.4s">
                    <div class="result-section-title">进化方向</div>
                    <div class="result-section-text">${p.evolve}</div>
                </div>
                <div class="result-section" style="animation-delay:0.5s">
                    <div class="result-section-title">四维得分</div>
                    <div class="score-bars">
                        ${result.sortedScores.map(([type,score]) => {
                            const key = type==='被动响应型'?'echoer':type==='过度承诺型'?'pleaser':type==='内耗努力型'?'soloer':'partner';
                            const pct = Math.round(score/20*100);
                            return `<div class="score-bar-item"><div class="score-bar-label">${type}</div><div class="score-bar-track"><div class="score-bar-fill ${key}" style="width:0%" data-width="${pct}%"></div></div><div class="score-bar-value">${score}</div></div>`;
                        }).join('')}
                    </div>
                </div>
                <div class="result-section" style="animation-delay:0.6s">
                    <div class="result-section-title">十维雷达</div>
                    <div class="radar-area">
                        <svg class="radar-chart" viewBox="0 0 280 280">${generateRadarSVG(result.dimensionDominant)}</svg>
                    </div>
                    <div class="dimension-tags">
                        ${dimensionNames.map((name,i) => {
                            const dom = result.dimensionDominant[i];
                            const color = dom==='客户伙伴型'?'#056E50':dom==='过度承诺型'?'#D97706':dom==='内耗努力型'?'#DB2777':'#6B7280';
                            return `<span class="dimension-tag-item" style="color:${color};background:${color}15">${name}·${dom.replace('型','')}</span>`;
                        }).join('')}
                    </div>
                </div>
            `;

            showPage('resultPage');
            setTimeout(() => {
                document.querySelectorAll('.score-bar-fill').forEach(bar => { bar.style.width = bar.dataset.width; });
            }, 300);
        }

        function generateRadarSVG(dominant) {
            const cx=140, cy=140, r=95;
            const colors = {'客户伙伴型':'#056E50','过度承诺型':'#D97706','内耗努力型':'#DB2777','被动响应型':'#6B7280'};
            let svg = '';
            for (let i=1;i<=4;i++) {
                const radius=(r/4)*i; let pts='';
                for (let j=0;j<10;j++) {
                    const angle=(Math.PI*2/10)*j-Math.PI/2;
                    pts += `${cx+radius*Math.cos(angle)},${cy+radius*Math.sin(angle)} `;
                }
                svg += `<polygon points="${pts}" fill="none" stroke="rgba(5,110,80,0.08)" stroke-width="1"/>`;
            }
            for (let j=0;j<10;j++) {
                const angle=(Math.PI*2/10)*j-Math.PI/2;
                svg += `<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(angle)}" y2="${cy+r*Math.sin(angle)}" stroke="rgba(5,110,80,0.08)" stroke-width="1"/>`;
            }
            let dataPts='';
            for (let j=0;j<10;j++) {
                const angle=(Math.PI*2/10)*j-Math.PI/2;
                const type=dominant[j];
                const score=type==='客户伙伴型'?1:type==='过度承诺型'?0.65:type==='内耗努力型'?0.35:0.15;
                dataPts += `${cx+r*score*Math.cos(angle)},${cy+r*score*Math.sin(angle)} `;
            }
            svg += `<polygon points="${dataPts}" fill="rgba(0,230,220,0.12)" stroke="#056E50" stroke-width="2"/>`;
            for (let j=0;j<10;j++) {
                const angle=(Math.PI*2/10)*j-Math.PI/2;
                const type=dominant[j];
                const color=colors[type]||'#056E50';
                const x=cx+(r+16)*Math.cos(angle);
                const y=cy+(r+16)*Math.sin(angle);
                const shortName=dimensionNames[j].substring(0,2);
                svg += `<text x="${x}" y="${y}" fill="${color}" font-size="11" text-anchor="middle" dominant-baseline="middle" font-weight="600">${shortName}</text>`;
            }
            return svg;
        }

        function generateCopyText() {
            if (!lastResult) return '';
            const result = lastResult;
            const p = personalities[result.mainType];
            const lines = [
                `🎯 我的PD人格测评结果：${result.mainType}PD · ${p.en}`,
                ``,
                `💬 ${p.quote}`,
                ``,
                `📊 四维得分：`,
                ...result.sortedScores.map(([type,score]) => `   ${type}：${score}分`),
                ``,
                `✅ 我的优势：`,
                p.advantage,
                ``,
                `⚠️ 我的风险：`,
                p.risk.replace(/<[^>]+>/g, ''),
                ``,
                `🚀 进化方向：`,
                p.evolve.replace(/<[^>]+>/g, ''),
                ``,
                `---`,
                `来测测你是哪种客户PD 👇`,
                window.location.href
            ];
            return lines.join('\n');
        }

        function copyResultText() {
            const text = generateCopyText();
            const textarea = document.getElementById('copyTextarea');
            textarea.value = text;
            document.getElementById('copyModal').classList.add('active');
        }

        function closeCopyModal(e) {
            if (!e || e.target.id === 'copyModal') {
                document.getElementById('copyModal').classList.remove('active');
            }
        }

        function doCopy() {
            const textarea = document.getElementById('copyTextarea');
            textarea.select();
            document.execCommand('copy');
            closeCopyModal();
            showToast('文案已复制到剪贴板！');
        }

        function shareResult() {
            const text = generateCopyText();
            if (navigator.share) {
                navigator.share({title:'PD人格测评',text:text,url:window.location.href}).catch(()=>{});
            } else {
                navigator.clipboard.writeText(text).then(()=>{showToast('结果已复制到剪贴板');});
            }
        }

        function restartQuiz() { currentQ=0; answers=new Array(20).fill(null); lastResult=null; showPage('homePage'); }

        function showToast(msg) {
            const toast=document.getElementById('toast');
            toast.textContent=msg; toast.classList.add('show');
            setTimeout(()=>toast.classList.remove('show'),2500);
        }

        initParticles();
    </script>
</body>
</html>
